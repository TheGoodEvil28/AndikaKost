name: CI/CD Main Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  ci:
    name: Build And Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: AndikaKost-Backend
        run: pip install -r requirements.txt

      - name: Backend smoke checks
        working-directory: AndikaKost-Backend
        run: |
          python -m compileall app

      - name: Run backend tests (if present)
        working-directory: AndikaKost-Backend
        run: |
          set +e
          pytest -q
          code=$?
          set -e

          if [ "$code" -eq 5 ]; then
            echo "No backend tests collected; continuing."
            exit 0
          fi

          exit "$code"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: AndikaKost-Frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: AndikaKost-Frontend
        run: npm ci

      - name: Build frontend
        working-directory: AndikaKost-Frontend
        run: npm run build

  deploy:
    name: Deploy To Server
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Remote deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.SERVER_APP_DIR }}"
            git fetch --all --prune
            git checkout main
            git reset --hard origin/main
            chmod +x scripts/deploy.sh
            ./scripts/deploy.sh
