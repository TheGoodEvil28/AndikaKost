name: CI/CD Main Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  ci:
    name: Build And Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: AndikaKost-Backend
        run: pip install -r requirements.txt

      - name: Backend smoke checks
        working-directory: AndikaKost-Backend
        run: python -m compileall app

      - name: Run backend tests (if present)
        working-directory: AndikaKost-Backend
        run: |
          set +e
          pytest -q
          code=$?
          set -e

          if [ "$code" -eq 5 ]; then
            echo "No backend tests collected; continuing."
            exit 0
          fi

          exit "$code"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: AndikaKost-Frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: AndikaKost-Frontend
        run: npm ci

      - name: Build frontend
        working-directory: AndikaKost-Frontend
        run: npm run build

      - name: Validate deployment compose config
        run: docker compose config --quiet

  deploy:
    name: Deploy To Server
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Install cloudflared
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64" -o /tmp/cloudflared
          sudo install -m 0755 /tmp/cloudflared /usr/local/bin/cloudflared
          cloudflared --version

      - name: Configure SSH key
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Start Cloudflare TCP forwarder
        run: |
          set -euo pipefail
          nohup /usr/local/bin/cloudflared access tcp \
            --hostname "${{ secrets.SERVER_HOST }}" \
            --url 127.0.0.1:2222 \
            --service-token-id "${{ secrets.CF_ACCESS_CLIENT_ID }}" \
            --service-token-secret "${{ secrets.CF_ACCESS_CLIENT_SECRET }}" \
            >/tmp/cloudflared-forwarder.log 2>&1 &

          for i in {1..15}; do
            if ss -ltn | grep -q "127.0.0.1:2222"; then
              echo "Cloudflare forwarder is listening on 127.0.0.1:2222"
              break
            fi
            sleep 1
          done

          if ! ss -ltn | grep -q "127.0.0.1:2222"; then
            echo "Cloudflare forwarder did not start"
            cat /tmp/cloudflared-forwarder.log || true
            exit 1
          fi

      - name: Remote deploy via SSH tunnel
        run: |
          set -euo pipefail
          APP_DIR='${{ secrets.SERVER_APP_DIR }}'
          if [ -z "$APP_DIR" ]; then
            APP_DIR='/opt/andikakost'
          fi

          ssh -o StrictHostKeyChecking=accept-new \
              -i ~/.ssh/id_ed25519 \
              -p 2222 \
              "${{ secrets.SERVER_USER }}"@127.0.0.1 "
                set -euo pipefail
                if [ ! -d '$APP_DIR' ]; then
                  echo 'Deploy directory not found. Set SERVER_APP_DIR correctly or create /opt/andikakost.'
                  exit 1
                fi
                cd '$APP_DIR'
                git fetch --all --prune
                git checkout main
                git reset --hard origin/main
                chmod +x scripts/deploy.sh
                ./scripts/deploy.sh
              "

      - name: Dump cloudflared logs on failure
        if: failure()
        run: |
          echo "==== /tmp/cloudflared-forwarder.log ===="
          cat /tmp/cloudflared-forwarder.log || true
