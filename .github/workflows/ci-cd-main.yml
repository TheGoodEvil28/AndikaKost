name: CI/CD Main Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  ci:
    name: Build And Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: AndikaKost-Backend
        run: pip install -r requirements.txt

      - name: Backend smoke checks
        working-directory: AndikaKost-Backend
        run: python -m compileall app

      - name: Run backend tests (if present)
        working-directory: AndikaKost-Backend
        run: |
          set +e
          pytest -q
          code=$?
          set -e

          if [ "$code" -eq 5 ]; then
            echo "No backend tests collected; continuing."
            exit 0
          fi

          exit "$code"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: AndikaKost-Frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: AndikaKost-Frontend
        run: npm ci

      - name: Build frontend
        working-directory: AndikaKost-Frontend
        run: npm run build

  deploy:
    name: Deploy To Server
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Install cloudflared
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64" -o /tmp/cloudflared
          sudo install -m 0755 /tmp/cloudflared /usr/local/bin/cloudflared
          cloudflared --version

      - name: Configure SSH for Cloudflare Access
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s\n' "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          cat > ~/.ssh/config <<CFG
          Host cf-deploy-target
            HostName ${{ secrets.SERVER_HOST }}
            User ${{ secrets.SERVER_USER }}
            Port ${{ secrets.SERVER_PORT }}
            IdentityFile ~/.ssh/id_ed25519
            StrictHostKeyChecking accept-new
            ProxyCommand /usr/local/bin/cloudflared access ssh --hostname %h --service-token-id ${{ secrets.CF_ACCESS_CLIENT_ID }} --service-token-secret ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          CFG

      - name: Remote deploy via SSH
        run: |
          set -euo pipefail
          ssh cf-deploy-target <<'REMOTE'
          set -euo pipefail
          cd "${{ secrets.SERVER_APP_DIR }}"
          git fetch --all --prune
          git checkout main
          git reset --hard origin/main
          chmod +x scripts/deploy.sh
          ./scripts/deploy.sh
          REMOTE
